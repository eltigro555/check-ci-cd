name: Python Code Check # Название, которое ты увидишь во вкладке Actions

on: [push] # Робот будет просыпаться каждый раз, когда ты делаешь git push

jobs:
  run-tests:
    runs-on: ubuntu-latest # Запускаем на чистой Ubuntu (как у тебя в терминале!)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Копируем файлы из твоего репо на сервер

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Версия Python

      - name: Install Pytest
        run: pip install pytest # Устанавливаем утилиту для тестов

      - name: Run my tests
        run: pytest test_main.py # Самая важная команда — запуск твоего теста
